name: vglg_mlp
type: mlp
d_model: 128         # token-mixing hidden dim along the time axis
n_layers: 2
kernel_size: 31      # depthwise conv kernel size in VGLG block
rank: 8              # low-rank dim of the global path
channel_mlp_ratio: 2 # channel-mixing FFN expansion (over n_vars)
dropout: 0.1
revin: true
affine: true
gate_hidden: 16      # hidden dim of the variate gate's MLP
gate_entropy_lambda: 0.0  # optional entropy regularization on gate values
