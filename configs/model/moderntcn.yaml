name: moderntcn
type: cnn
# Single-stage simplified version. The official multi-stage config is harder
# to get right across different seq_len; the single-stage variant matches
# the configs the authors actually use on ETT/Weather.
patch_size: 16
patch_stride: 8
ffn_ratio: 1
num_blocks: 1
large_size: 31
small_size: 5
d_model: 64
backbone_dropout: 0.1
head_dropout: 0.1
revin: true
affine: false
