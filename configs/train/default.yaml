name: default
seq_len: 96
label_len: 48
pred_len: 96

# Optimization
batch_size: 32
num_workers: 4
train_epochs: 10
patience: 3
learning_rate: 0.0001
loss: mse
lradj: type1            # type1 (halving) | type3 (cosine) | constant
weight_decay: 0.0
gradient_clip: 1.0
use_amp: true

# Logging
log_interval: 50
val_interval: 1
checkpoint_dir: checkpoints
use_wandb: false
wandb_project: vglg-tsf
