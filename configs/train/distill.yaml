defaults:
  - default

name: distill
teacher: amazon/chronos-bolt-base
teacher_cache_dir: cache/teacher
# KD term weights. With ortho-normalized FFTs all KD terms are O(MSE) scale
# (unlike the old un-normalized version where trend~160/freq~24 forced λ~1e-4
# and caused divergence). soft = direct MSE(student, teacher) is the main KD
# signal; trend/diff are smaller spectral/slope auxiliaries.
distill_lambda_task: 1.0       # weight on the task MSE(student, ground-truth)
distill_lambda_soft: 0.5       # direct soft-target MSE(student, teacher)
distill_lambda_trend: 0.1      # low-freq Fourier (ortho) match
distill_lambda_diff: 0.1       # first-difference / local-slope match
distill_warmup_epochs: 1       # epochs of pure MSE before activating KD
